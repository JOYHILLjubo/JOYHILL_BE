name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git pull origin main
            ./gradlew --stop || true
            ./gradlew build -x test --no-daemon
            sudo systemctl restart joy-backend
            sudo systemctl status joy-backend --no-pager
