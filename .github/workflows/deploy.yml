name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build JAR
        run: ./gradlew build -x test --no-daemon

      - name: Rename JAR (plain 제거)
        run: |
          JAR=$(ls build/libs/ | grep -v plain | grep '\.jar$')
          mv build/libs/$JAR build/libs/app.jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/app.jar"
          target: ${{ secrets.EC2_APP_DIR }}
          strip_components: 2

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            sudo systemctl restart joy-backend
            sleep 5
            sudo systemctl is-active joy-backend
